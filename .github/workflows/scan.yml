name: Pokemon Deal Scanner

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary for reliable rebasing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scanner
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
        run: python scanner.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage all potential changes
          git add seen_listings.json deals_log.json watchlist.json heartbeat.txt || true
          
          # Only proceed if there are changes to commit
          if ! git diff --cached --quiet; then
            git commit -m "Automated price sync and seen listings update [skip ci]"
            
            # Use a robust pull-rebase loop to handle race conditions
            for i in {1..5}; do
              git pull --rebase origin main && git push origin main && break || {
                echo "Git push failed, retrying in 5s... (Attempt $i)"
                sleep 5
              }
            done
          else
            echo "No changes to commit"
          fi
